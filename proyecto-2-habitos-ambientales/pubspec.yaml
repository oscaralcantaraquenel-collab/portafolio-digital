name: reto_verde
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  flutter_local_notifications: ^17.0.0
  url_launcher: ^6.3.2
  share_plus: ^8.0.0
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  shared_preferences: ^2.5.5
  firebase_storage: ^12.2.0
  file_picker: ^8.0.7
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9
  patrol: ^3.15.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.jpeg

patrol:
  app_name: Reto Verde
  android:
    app_id: com.example.reto_verde
  ios:
    bundle_id: com.example.retoVerde